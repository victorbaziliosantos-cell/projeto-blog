<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog Simples</title>
    <!-- Vincula o arquivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cabeçalho do Blog -->
    <header>
        <h1>DevBlog 🚀</h1>
        <p>Compartilhando ideias de forma simples</p>
    </header>

    <div class="container">
        
        <!-- Formulário para Criar Novo Post -->
        <div class="form-container">
            <h2>Nova Publicação</h2>
            <form id="blogForm">
                <input type="text" id="postTitle" placeholder="Título da sua postagem" required>
                <textarea id="postContent" placeholder="Escreva o conteúdo aqui..." required></textarea>
                <button type="submit">Publicar</button>
            </form>
        </div>

        <!-- Seção onde as postagens vão aparecer -->
        <main id="blogFeed">
            <!-- Postagem Padrão -->
            <article class="post">
                <h2>Minha Primeira Postagem no Blog</h2>
                <div class="date">Publicado em 18 de junho de 2026</div>
                <p>Este é o layout inicial do nosso blog criado com a estrutura dividida em arquivos separados de HTML, CSS e JavaScript.</p>
            </article>
        </main>

    </div>

    <!-- Vincula o arquivo de funções JavaScript -->
    <script src="script.js"></script>
</body>
</html>
